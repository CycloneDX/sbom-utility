# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  issues-exit-code: 2

issues:
  exclude-dirs:
    - gui

# https://golangci-lint.run/usage/false-positives/
# https://staticcheck.io/docs/
linters:
  settings:
    govet:
      disable:
        - printf
    staticcheck:
      checks:
        - all
        - '-SA4005' # disable the rule SA1000
